name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  core:
    name: Core (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv venv && uv pip install -e ".[dev]"

      - name: Lint
        run: uv run ruff check .

      - name: Typecheck
        run: uv run mypy --strict src

      - name: Unit + integration tests
        run: uv run pytest -q --ignore tests/eval

      - name: Scenario evals
        run: uv run pytest tests/eval -q

  edge:
    name: Edge (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edge
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - run: npm run typecheck

      - run: npm run lint --silent

      - run: npm test --silent

  frontend:
    name: Frontend (Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run build
