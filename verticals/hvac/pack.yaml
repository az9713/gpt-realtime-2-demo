name: hvac
version: 0.1.0
persona: Aria
modes:
  - realtime2
  - translate
  - notetaker
  - voicemail
surfaces:
  - browser
  - phone
languages:
  - en
  - es
  - fr
auto_translate_non_english: true

description: |
  HVAC dispatcher for a small operator. Handles inbound homeowner and
  technician calls, looks up parts and schedules, and gates dangerous
  scheduling/dispatch actions behind dispatcher approval.

surfaces_meta:
  phone:
    primary: true
  browser:
    primary: false  # for the human dispatcher

# Phase 4: business hours. Outside these the Twilio webhook serves the
# voicemail TwiML instead of the agent TwiML. Default off (no voicemail
# overflow). Days: ISO weekday, 1=Monday … 7=Sunday.
business_hours:
  tz: America/Chicago
  open: "09:00"
  close: "17:00"
  days: [1, 2, 3, 4, 5]

voicemail_greeting: voicemail.md
